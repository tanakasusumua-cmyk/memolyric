<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Memolyric — 記録&練習モード</title>
  <style>
    :root{
      --bg:#000000;
      --fg:#ffffff;
      --neon:#00ffcc;
      --accent:#7c4dff;
      --panel:#111111;
      --border:rgba(255,255,255,0.08);
    }
    html,body{height:100%;}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
      font-size:16px;
      touch-action:manipulation;
      display:flex;
      flex-direction:column;
    }
    header{
      padding:14px 16px 8px;
      display:flex;
      flex-direction:column;
      gap:10px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:#040404;
      position:sticky;
      top:0;
      z-index:10;
    }
    .top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .top-row h1{margin:0;font-size:18px;color:var(--neon);letter-spacing:.06em;}
    .wakelock-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);padding:10px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;transition:all .2s;min-height:44px;}
    .wakelock-btn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,255,204,0.08);}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;}
    .tab-button{background:transparent;border:1px solid rgba(0,255,204,0.18);color:var(--fg);padding:13px 22px;border-radius:999px;cursor:pointer;font-size:15px;font-weight:700;min-height:48px;}
    .tab-button.active{background:var(--neon);color:#000;border-color:transparent;}
    .status-text{color:rgba(255,255,255,0.6);font-size:13px;}
    main{flex:1;display:flex;gap:16px;padding:16px;box-sizing:border-box;}
    .panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:16px;}
    .card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 0 0 1px rgba(255,255,255,0.01);}
    .panel.hidden{display:none;}
    label{display:block;margin-bottom:8px;color:var(--fg);font-size:14px;}
    input[type=text],select,textarea{width:100%;box-sizing:border-box;padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--fg);outline:none;font-size:16px;}
    textarea{min-height:160px;resize:vertical;line-height:1.5;}
    .muted{color:rgba(255,255,255,0.55);font-size:13px;}
    .controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
    button{background:var(--neon);color:#000;border:none;padding:14px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:16px;min-height:48px;}
    button.ghost{background:transparent;color:var(--neon);border:1px solid rgba(0,255,204,0.2);}
    button.secondary{background:rgba(255,255,255,0.08);color:var(--fg);}
    button.danger{background:rgba(255,60,60,0.15);color:#ff6b6b;border:1px solid rgba(255,60,60,0.3);}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    .log{flex:1;overflow:auto;padding:12px;background:rgba(255,255,255,0.02);border-radius:10px;font-family:Menlo,monospace;font-size:13px;min-height:180px;}
    .log-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);}
    .preview{font-size:22px;color:var(--neon);text-align:center;padding:12px;}
    .tap-zone{display:flex;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(180deg, rgba(0,255,204,0.04), rgba(124,77,255,0.03));margin:8px 0;height:300px;}
    .tap-zone button{all:unset;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;background:var(--neon);border-radius:12px;cursor:pointer;letter-spacing:.04em;-webkit-user-select:none;user-select:none;}
    .audio-meta{margin-top:8px;color:rgba(255,255,255,0.55);font-size:13px;}
    .file-select-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;box-sizing:border-box;padding:18px 16px;background:rgba(0,255,204,0.07);border:2px dashed rgba(0,255,204,0.35);border-radius:12px;color:var(--neon);font-size:16px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.02em;transition:background .15s;-webkit-user-select:none;user-select:none;}
    .file-select-btn:active{background:rgba(0,255,204,0.18);}
    .file-select-btn.has-file{background:rgba(0,255,204,0.12);border-style:solid;}
    .practice-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .practice-player{width:100%;max-width:640px;}
    .practice-stage{position:relative;flex:1;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,0.06);border-radius:16px;display:flex;align-items:center;justify-content:center;}
    .practice-display{position:relative;width:100%;height:100%;}
    .practice-current-wrap{position:absolute;top:15%;left:0;right:0;bottom:24%;overflow:hidden;padding:0 24px;}
    .practice-current{display:block;width:100%;white-space:normal;overflow-wrap:break-word;word-break:break-all;text-align:center;font-size:10vw;font-weight:800;line-height:1.3;transform:translateY(0);transition:transform 0.1s linear;}
    .practice-next{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);opacity:0.3;font-size:5.5vw;font-weight:700;white-space:nowrap;pointer-events:none;max-width:90%;text-align:center;overflow:hidden;text-overflow:ellipsis;}
    .practice-controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center;}
    .practice-instruction{color:rgba(255,255,255,0.65);font-size:14px;}
    .practice-stage{min-height:200px;}
    .practice-tap-layer{position:absolute;inset:0;display:flex;touch-action:manipulation;}
    .practice-side{flex:1;transition:background .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
    .practice-side[data-side="left"]{background:linear-gradient(to right,rgba(0,255,204,0.10),transparent);}
    .practice-side[data-side="right"]{background:linear-gradient(to left,rgba(0,255,204,0.10),transparent);}
    .practice-side::after{content:' ';display:block;height:100%;}
    .musokui-char{color:rgba(255,255,255,0.22);cursor:pointer;transition:color .2s;}
    .musokui-char.revealed{color:var(--neon);}
    .musokui-toggle-btn{padding:12px 20px;font-size:15px;font-weight:700;border-radius:999px;background:transparent;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);cursor:pointer;transition:all .2s;min-height:48px;}
    .musokui-toggle-btn.on{background:rgba(0,255,204,0.15);color:var(--neon);border-color:rgba(0,255,204,0.4);}

    /* 曲一覧リスト */
    .song-item{border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-bottom:8px;}
    .song-item-header{display:flex;align-items:center;gap:8px;padding:14px;cursor:pointer;background:rgba(255,255,255,0.03);-webkit-user-select:none;user-select:none;min-height:56px;}
    .song-item-header:active{background:rgba(255,255,255,0.06);}
    .song-item-title{flex:1;font-weight:700;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .song-item-meta{font-size:13px;color:rgba(255,255,255,0.4);white-space:nowrap;flex-shrink:0;}
    .song-item-arrow{font-size:12px;color:rgba(255,255,255,0.35);flex-shrink:0;transition:transform .2s;}
    .song-item-arrow.open{transform:rotate(180deg);}
    .song-item-detail{display:none;padding:14px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.015);}
    .song-item-detail.open{display:block;}
    .song-item-lyrics{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.7;max-height:140px;overflow-y:auto;background:rgba(0,0,0,0.25);border-radius:8px;padding:12px;margin-bottom:12px;white-space:pre-wrap;font-family:Menlo,monospace;}
    .song-item-info{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:10px;}
    .song-item-actions{display:flex;gap:10px;}
    .song-item-actions button{font-size:15px;padding:12px 20px;border-radius:10px;min-height:48px;}
    .song-list-empty{text-align:center;color:rgba(255,255,255,0.3);font-size:14px;padding:24px 0;}

    /* セットリスト */
    .setlist-section-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
    .setlist-song-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
    .setlist-song-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;min-height:56px;}
    .setlist-song-num{color:var(--neon);font-size:15px;font-weight:700;min-width:26px;}
    .setlist-song-name{flex:1;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .setlist-song-actions{display:flex;gap:8px;flex-shrink:0;}
    .setlist-song-actions button{padding:10px 14px;font-size:14px;border-radius:8px;min-height:44px;}
    .setlist-empty{color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:20px 0;}
    .setlist-name-row{display:flex;gap:10px;align-items:center;}
    .setlist-name-row input{flex:1;}

    @media (max-width:960px){main{flex-direction:column;} .practice-next{font-size:6vw;}}
  </style>
</head>
<body>
  <header>
    <div class="top-row">
      <h1>Memolyric</h1>
      <button class="wakelock-btn" id="wakelock-btn" title="スリープ防止のON/OFF">スリープ防止</button>
    </div>
    <div class="tabs">
      <button class="tab-button active" id="tab-practice">Play</button>
      <button class="tab-button" id="tab-record">Edit</button>
      <button class="tab-button" id="tab-setlist">SetList</button>
    </div>
  </header>

  <main>
    <!-- 記録モード -->
    <section class="panel" id="record-panel">

      <!-- 曲選択ドロップダウン -->
      <div class="card" style="padding:12px 14px;">
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="song-select-dropdown" style="flex:1;padding:10px;font-size:15px;font-weight:700;border-radius:8px;">
            <option value="">＋ 新規追加</option>
          </select>
          <button id="delete-song-btn" class="ghost danger" style="display:none;white-space:nowrap;flex-shrink:0;">削除</button>
        </div>
      </div>

      <div class="card" id="setup-card">
        <label>曲名</label>
        <input type="text" id="song-title" placeholder="曲名を入力してください">

        <input type="file" id="audio-file" accept=".mp3,.m4a,.aac,.wav,audio/*" style="display:none;">
        <label for="audio-file" class="file-select-btn" id="file-select-label">音楽ファイルを選択</label>
        <div class="muted" style="margin-top:6px;">iPhoneの場合はファイルアプリから mp3 を選んでください。</div>

        <label style="margin-top:12px">歌詞（改行で行に分割）</label>
        <textarea id="lyrics-input" placeholder="歌詞を貼り付けてください"></textarea>
        <div class="muted" id="lines-count">行: 0</div>

        <div class="controls">
          <button id="to-record" class="ghost secondary">記録を開始</button>
          <button id="clear-setup" class="ghost secondary">クリア</button>
        </div>
      </div>


      <div class="card" id="record-card" style="display:none;">
        <div class="row" style="justify-content:space-between;align-items:flex-start;">
          <div style="flex:1;min-width:220px;">
            <div class="muted">再生プレイヤー（ローカル）</div>
            <audio id="audio-player" controls preload="metadata" style="width:100%;margin-top:8px;background:transparent"></audio>
            <div id="audio-filename" class="audio-meta"></div>
          </div>
          <div style="text-align:right;min-width:180px;">
            <div class="muted">現在の曲</div>
            <div id="current-title" style="font-weight:700;color:var(--neon);"></div>
          </div>
        </div>

        <div class="preview" id="next-preview">— 次のフレーズ —</div>

        <div class="tap-zone" id="tap-zone">
          <button id="tap-btn">次の歌詞へ...</button>
        </div>

        <div>
          <label>記録ログ</label>
          <div class="log" id="log-area"></div>
        </div>

        <div class="controls" style="justify-content:flex-end;">
          <button id="save-record">記録を保存</button>
          <button id="back-setup" class="ghost secondary">キャンセル</button>
        </div>
      </div>
    </section>

    <!-- 練習モード -->
    <section class="panel hidden" id="practice-panel">

      <!-- セットリスト選択・曲ナビ -->
      <div class="card" id="practice-setlist-card" style="padding:12px 14px;">
        <!-- セットリスト選択 -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="muted" style="white-space:nowrap;font-size:12px;">セットリスト:</span>
          <select id="practice-setlist-select" style="flex:1;min-width:120px;padding:8px 10px;font-size:13px;">
            <option value="">＋ 新規追加</option>
          </select>
        </div>

        <!-- 曲ナビ（セットリスト選択時のみ表示） -->
        <div id="practice-setlist-nav" style="display:none;margin-top:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <button id="prev-song-btn" class="ghost secondary" style="flex-shrink:0;">← 前</button>
            <div id="practice-setlist-progress" style="font-size:13px;color:rgba(255,255,255,0.5);text-align:center;"></div>
            <button id="next-song-btn" class="ghost secondary" style="flex-shrink:0;">次 →</button>
          </div>
        </div>

        <!-- 虫食いモード切り替え -->
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <span class="muted" style="font-size:14px;">虫食いモード（暗記練習）</span>
          <button id="musokui-toggle" class="musokui-toggle-btn">OFF</button>
        </div>
      </div>

      <div class="practice-stage" id="practice-stage">
        <div class="practice-display">
          <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;z-index:1;overflow:hidden;">
            <div id="practice-title" style="font-size:20px;font-weight:800;color:var(--neon);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.9;letter-spacing:.04em;"></div>
            <div id="practice-timer" style="font-size:20px;font-family:Menlo,monospace;color:var(--neon);letter-spacing:.05em;white-space:nowrap;flex-shrink:0;opacity:0.75;">0:00.00</div>
          </div>
          <div class="practice-current-wrap">
            <span id="practice-current" class="practice-current">—</span>
          </div>
          <div id="practice-next" class="practice-next">次の行</div>
        </div>
        <div class="practice-tap-layer" id="practice-tap-layer">
          <div class="practice-side" data-side="left"></div>
          <div class="practice-side" data-side="right"></div>
        </div>
      </div>

      <div id="practice-transport" style="display:none;gap:10px;padding:0 2px;">
        <button id="practice-pause-btn" style="flex:1;background:rgba(0,255,204,0.12);color:var(--neon);border:1px solid rgba(0,255,204,0.35);padding:14px;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;letter-spacing:.04em;">一時停止</button>
        <button id="practice-stop-btn" style="flex:0 0 auto;background:rgba(255,60,60,0.12);color:#ff6b6b;border:1px solid rgba(255,60,60,0.35);padding:14px 20px;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;">停止</button>
      </div>

    </section>

    <!-- セットリストパネル -->
    <section class="panel hidden" id="setlist-panel">

      <!-- 選択（Editと統一レイアウト） -->
      <div class="card" style="padding:12px 14px;">
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="setlist-select" style="flex:1;padding:10px;font-size:15px;font-weight:700;border-radius:8px;">
            <option value="">＋ 新規追加</option>
          </select>
          <button id="delete-setlist-btn" class="ghost danger" style="display:none;white-space:nowrap;flex-shrink:0;">削除</button>
        </div>
      </div>

      <!-- 編集フォーム -->
      <div class="card">
        <label>セットリスト名</label>
        <input type="text" id="setlist-name-input" placeholder="セットリスト名を入力">

        <div style="margin-top:16px;">
          <div class="setlist-section-title">曲リスト</div>
          <div id="setlist-song-list" class="setlist-song-list"></div>
          <div id="setlist-song-empty" class="setlist-empty" style="display:none;">曲がありません。下から追加してください。</div>
        </div>

        <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);">
          <div class="setlist-section-title">曲を追加</div>
          <div class="row" style="gap:10px;">
            <select id="add-song-select" style="flex:1;">
              <option value="">— 保存済みの曲から選択 —</option>
            </select>
            <button id="add-song-btn" style="white-space:nowrap;flex-shrink:0;">追加</button>
          </div>
        </div>
      </div>

      <!-- 保存ボタン -->
      <button id="save-setlist-btn" style="width:100%;">SetListを保存</button>

    </section>
  </main>

  <!-- オーバーレイ: 練習開始 -->
  <div id="practice-start-overlay" style="position:fixed;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:200;">
    <div id="practice-start-lyric" style="position:absolute;left:0;right:0;text-align:center;font-size:9vw;font-weight:800;color:#fff;opacity:0.18;padding:0 24px;word-break:break-all;pointer-events:none;line-height:1.3;"></div>
    <div id="practice-overlay-title" style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:20px;font-weight:800;color:var(--neon);padding:12px 16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.9;letter-spacing:.04em;pointer-events:none;"></div>
    <button id="practice-start-btn" style="all:unset;flex:1;width:100%;display:flex;align-items:center;justify-content:center;font-size:22vw;font-weight:900;color:rgb(255,60,60);letter-spacing:-0.02em;cursor:pointer;-webkit-user-select:none;user-select:none;">START</button>
  </div>


  <footer style="padding:14px 16px;color:rgba(255,255,255,0.55);font-size:13px;border-top:1px solid rgba(255,255,255,0.08);">
    <div>操作: 画面の右/左をタップして行を手動ジャンプできます。再生停止時は自動送りとスクロールが停止します。</div>
  </footer>

  <script>
    /* ─── DOM refs ─── */
    const tabRecord    = document.getElementById('tab-record');
    const tabPractice  = document.getElementById('tab-practice');
    const tabSetlist   = document.getElementById('tab-setlist');
    const recordPanel  = document.getElementById('record-panel');
    const practicePanel= document.getElementById('practice-panel');
    const setlistPanel = document.getElementById('setlist-panel');

    const practiceCurrent  = document.getElementById('practice-current');
    const practiceNext     = document.getElementById('practice-next');
    const practiceTapLayer = document.getElementById('practice-tap-layer');
    const practiceTitle    = document.getElementById('practice-title');

    const titleInput    = document.getElementById('song-title');
    const audioFileInput= document.getElementById('audio-file');
    const lyricsInput   = document.getElementById('lyrics-input');
    const linesCount    = document.getElementById('lines-count');
    const toRecordBtn   = document.getElementById('to-record');
    const clearSetupBtn = document.getElementById('clear-setup');
    const nextPreview   = document.getElementById('next-preview');
    const tapBtn        = document.getElementById('tap-btn');
    const logArea       = document.getElementById('log-area');
    const saveRecordBtn = document.getElementById('save-record');
    const backSetupBtn  = document.getElementById('back-setup');
    const audioFilename = document.getElementById('audio-filename');
    const setupCard     = document.getElementById('setup-card');
    const recordCard    = document.getElementById('record-card');
    const audioPlayer   = document.getElementById('audio-player');


    /* ─── State ─── */
    let lyricsLines      = [];
    let timestamps       = [];
    let currentIndex     = 0;
    let recordIntroTime  = null;
    let audioFile        = null;
    let ignoreClick      = false;
    let prevAudioURL     = null;

    let practiceData          = null;
    let practiceLine          = 0;
    let practiceStarted       = false;
    let practicePaused        = false;
    let pauseWall             = 0;
    let lineStartWall         = 0;
    let lineDurationMs        = 0;
    let playFromStart         = false;
    let practiceScrollDistance= 0;
    let practiceScrollDuration= 0;
    let practiceAnimation     = null;
    let timerStartWall        = 0;
    let timerAccumulated      = 0;

    /* ─── 虫食いモード ─── */
    let musokuiMode = 0; // 0=OFF 1=Lv1 2=Lv2 3=Lv3
    let musokuiHiddenSet = new Set();
    const MUSOKUI_SKIP = new Set([
      ' ','　','、','。','！','？','!','?','・','…','〜','ー',
      '（','）','(',')','"','"','「','」','『','』','【','】',
      '〈','〉','—','-','/','\n'
    ]);

    function escapeHtml(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCurrentLine(text){
      if(!musokuiMode || !text){
        practiceCurrent.textContent = text || '—';
        return;
      }
      const chars = [...text];
      const contentIdx = chars.map((c,i)=>MUSOKUI_SKIP.has(c)?null:i).filter(i=>i!==null);
      let showSet = new Set();

      if(musokuiMode===1){
        // Lv1: 先頭3文字を表示
        contentIdx.slice(0,3).forEach(i=>showSet.add(i));
      } else if(musokuiMode===2){
        // Lv2: 先頭1文字を表示
        if(contentIdx.length>0) showSet.add(contentIdx[0]);
      } else {
        // Lv3: 3パターンランダム（全部虫食い / 先頭1文字 / 最後3文字）
        const pattern = Math.floor(Math.random()*3);
        if(pattern===1 && contentIdx.length>0){
          showSet.add(contentIdx[0]);
        } else if(pattern===2){
          contentIdx.slice(-3).forEach(i=>showSet.add(i));
        }
      }

      musokuiHiddenSet = new Set(contentIdx.filter(i=>!showSet.has(i)));
      const html = chars.map((c,i)=>{
        if(musokuiHiddenSet.has(i)){
          return `<span class="musokui-char" data-char="${escapeHtml(c)}">◯</span>`;
        }
        return escapeHtml(c);
      }).join('');
      practiceCurrent.innerHTML = html;
    }

    function updateMusokuiBtn(){
      const btn = document.getElementById('musokui-toggle');
      if(!btn) return;
      const labels=['OFF','Lv.1','Lv.2','Lv.3'];
      btn.textContent=labels[musokuiMode];
      if(musokuiMode>0) btn.classList.add('on');
      else btn.classList.remove('on');
    }

    /* ─── Helpers ─── */
    function formatTime(t){
      if(!isFinite(t)) t=0;
      const total=Math.max(0,t);
      const minutes=Math.floor(total/60);
      const seconds=Math.floor(total%60);
      const ms=Math.floor((total-Math.floor(total))*1000);
      const centi=Math.floor(ms/10);
      return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}.${String(centi).padStart(2,'0')}`;
    }
    function clamp(v,a,b){return Math.min(b,Math.max(a,v));}

    function formatElapsed(ms){
      const cs=Math.floor(ms/10);
      const s=Math.floor(cs/100);
      const m=Math.floor(s/60);
      return `${m}:${String(s%60).padStart(2,'0')}.${String(cs%100).padStart(2,'0')}`;
    }
    const practiceTimerEl=document.getElementById('practice-timer');
    function updateTimer(){
      if(!practiceTimerEl) return;
      const elapsed=timerAccumulated+(practiceStarted&&!practicePaused?performance.now()-timerStartWall:0);
      practiceTimerEl.textContent=formatElapsed(Math.max(0,elapsed));
    }

    /* ─── 音声ファイル ─── */
    function setAudioSource(file){
      if(!file) return;
      try{if(prevAudioURL){URL.revokeObjectURL(prevAudioURL);prevAudioURL=null;}}catch(e){}
      const url=URL.createObjectURL(file);
      prevAudioURL=url;
      audioPlayer.src=url;
      audioPlayer.load();
      audioPlayer.currentTime=0;
      audioFilename.textContent=`${file.name} (${file.type||'unknown'})`;
      if(!file.type && !file.name.toLowerCase().endsWith('.mp3')){
        alert('選択したファイルの種類が iPhone で判別できませんでした。mp3 などの音声ファイルを選択してください。');
      }
    }

    function getLineDurationMs(index){
      if(!practiceData) return 5000;
      if(index===0 && playFromStart){
        if(practiceData.introTime!=null){
          const t=practiceData.timestamps[0];
          if(!t) return 5000;
          return Math.max(500,t.time*1000);
        }
        const t=practiceData.timestamps[1]||practiceData.timestamps[0];
        if(!t) return 5000;
        return Math.max(500,t.time*1000);
      }
      if(practiceData.introTime!=null){
        if(index===0){
          const t0=practiceData.timestamps[0];
          if(!t0) return 5000;
          return Math.max(500,(t0.time-practiceData.introTime)*1000);
        }
        const t0=practiceData.timestamps[index-1];
        const t1=practiceData.timestamps[index];
        if(!t0||!t1) return 5000;
        return Math.max(500,(t1.time-t0.time)*1000);
      }
      const t0=practiceData.timestamps[index];
      const t1=practiceData.timestamps[index+1];
      if(!t0||!t1) return 5000;
      return Math.max(500,(t1.time-t0.time)*1000);
    }

    function updatePracticeView(){
      const hasIntro=practiceData.introTime!=null;
      let text, nextText;
      if(hasIntro && practiceLine===0){
        // イントロ区間
        practiceCurrent.textContent='ー intro ー';
        musokuiHiddenSet=new Set();
        nextText=musokuiMode?'':(practiceData.lyrics[0]||'—');
      } else {
        const li=hasIntro ? practiceLine-1 : practiceLine;
        text=practiceData.lyrics[li]||'';
        musokuiHiddenSet=new Set();
        renderCurrentLine(text);
        nextText=musokuiMode?'':(practiceData.lyrics[li+1]||'—');
      }
      practiceNext.textContent=nextText;
      practiceCurrent.style.transform='translateY(0)';
      practiceCurrent.style.marginTop='0';
      computeScrollForCurrentLine();
    }

    function computeScrollForCurrentLine(){
      requestAnimationFrame(()=>{
        const wrap=practiceCurrent.parentElement;
        if(!wrap) return;
        const maxH=wrap.clientHeight;
        let fs=Math.min(maxH*0.44,window.innerWidth*0.11,52);
        practiceCurrent.style.fontSize=fs+'px';
        const sh1=practiceCurrent.scrollHeight;
        if(sh1>maxH){
          fs=Math.max(14,Math.floor(fs*maxH/sh1*0.96));
          practiceCurrent.style.fontSize=fs+'px';
        }
        const overflow=Math.max(0,practiceCurrent.scrollHeight-maxH);
        const interval=lineDurationMs/1000;
        if(overflow>0 && interval>0.5){
          practiceScrollDistance=overflow;
          practiceScrollDuration=Math.max(0.2,interval-0.5);
          practiceCurrent.style.marginTop='0';
        } else {
          practiceScrollDistance=0;practiceScrollDuration=0;
          practiceCurrent.style.marginTop=Math.max(0,(maxH-practiceCurrent.scrollHeight)/2)+'px';
        }
      });
    }

    function updatePracticeAnimation(){
      updateTimer();
      if(!practiceData||!practiceStarted||practicePaused) return;
      const elapsedMs=performance.now()-lineStartWall;
      const elapsedSec=elapsedMs/1000;
      if(practiceScrollDistance>0 && practiceScrollDuration>0){
        const progress=clamp(elapsedSec/practiceScrollDuration,0,1);
        practiceCurrent.style.transform=`translateY(${(-practiceScrollDistance*progress).toFixed(2)}px)`;
      } else {
        practiceCurrent.style.transform='translateY(0)';
      }
      if(elapsedMs>=lineDurationMs) jumpPracticeLine(practiceLine+1,false);
    }

    function startPracticeLoop(){
      if(practiceAnimation) cancelAnimationFrame(practiceAnimation);
      const step=()=>{updatePracticeAnimation();practiceAnimation=requestAnimationFrame(step);};
      practiceAnimation=requestAnimationFrame(step);
    }

    function jumpPracticeLine(targetIndex,manual){
      if(!practiceData) return;
      const count=practiceData.lyrics.length;
      // introTime がある場合: practiceLine 0=intro, 1..count=歌詞
      const maxLine=practiceData.introTime!=null ? count : count-1;

      // 曲の終わりを超えたとき
      if(!manual && targetIndex>maxLine){
        if(practiceSetlistId){
          const setlists=loadSetlists();
          const sl=setlists.find(s=>s.id===practiceSetlistId);
          if(sl && practiceSetlistSongIdx<sl.songs.length-1){
            practiceStarted=false;
            jumpToSetlistSong(practiceSetlistSongIdx+1);
            return;
          }
        }
        targetIndex=maxLine;
      }

      const nextLine=clamp(targetIndex,0,maxLine);
      if(nextLine===practiceLine&&!manual) return;
      if(manual||nextLine!==0) playFromStart=false;
      practiceLine=nextLine;
      lineDurationMs=getLineDurationMs(practiceLine);
      lineStartWall=performance.now();
      updatePracticeView();
    }

    practiceTapLayer.addEventListener('pointerdown',(ev)=>{
      ev.preventDefault();
      // 虫食いモード: タップ位置の下にある .musokui-char を判定
      if(musokuiMode){
        practiceTapLayer.style.pointerEvents='none';
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        practiceTapLayer.style.pointerEvents='';
        if(el && el.classList.contains('musokui-char') && !el.classList.contains('revealed')){
          el.textContent=el.dataset.char;
          el.classList.add('revealed');
          return;
        }
      }
      if(!practiceStarted) return;
      const rect=practiceTapLayer.getBoundingClientRect();
      const x=ev.clientX-rect.left;
      const side=x>rect.width/2?'right':'left';
      if(side==='right') jumpPracticeLine(practiceLine+1,true);
      else jumpPracticeLine(practiceLine-1,true);
    });

    document.getElementById('musokui-toggle').addEventListener('click',()=>{
      musokuiMode=(musokuiMode+1)%4; // 0→1→2→3→0
      updateMusokuiBtn();
      // 練習中なら現在行を即再描画
      if(practiceStarted && practiceData){
        musokuiHiddenSet=new Set();
        renderCurrentLine(practiceData.lyrics[practiceLine]||'');
      }
    });

    /* ═══════════════════════════════════════════
       セットリスト練習モード
    ═══════════════════════════════════════════ */
    let practiceSetlistId='';
    let practiceSetlistSongIdx=0;

    function loadPracticeDataFromKey(songKey){
      if(!songKey) return null;
      try{
        const stored=JSON.parse(localStorage.getItem(songKey));
        if(!stored||!Array.isArray(stored.timestamps)||stored.timestamps.length===0) return null;
        return {title:stored.title||songKey.replace('memolyric_',''),lyrics:stored.lyrics||[],timestamps:stored.timestamps,introTime:stored.introTime??null};
      }catch{return null;}
    }

    function refreshPracticeSetlistSelect(){
      const sel=document.getElementById('practice-setlist-select');
      const prev=sel.value;
      const setlists=loadSetlists();
      sel.innerHTML='<option value="">＋ 新規追加</option>';
      setlists.forEach(sl=>{
        const opt=document.createElement('option');
        opt.value=sl.id;
        opt.textContent=sl.name+(sl.songs.length>0?` (${sl.songs.length}曲)`:'');
        sel.appendChild(opt);
      });
      if(prev) sel.value=prev;
    }

    function updatePracticeSetlistNav(){
      const nav=document.getElementById('practice-setlist-nav');
      if(!practiceSetlistId){nav.style.display='none';return;}
      const setlists=loadSetlists();
      const sl=setlists.find(s=>s.id===practiceSetlistId);
      if(!sl||sl.songs.length===0){nav.style.display='none';return;}
      nav.style.display='block';
      document.getElementById('practice-setlist-progress').textContent=`${practiceSetlistSongIdx+1} / ${sl.songs.length} 曲目`;
      const prevBtn=document.getElementById('prev-song-btn');
      const nextBtn=document.getElementById('next-song-btn');
      prevBtn.disabled=practiceSetlistSongIdx===0;
      prevBtn.style.opacity=practiceSetlistSongIdx===0?'0.3':'1';
      nextBtn.disabled=practiceSetlistSongIdx===sl.songs.length-1;
      nextBtn.style.opacity=practiceSetlistSongIdx===sl.songs.length-1?'0.3':'1';
    }

    function jumpToSetlistSong(idx){
      const setlists=loadSetlists();
      const sl=setlists.find(s=>s.id===practiceSetlistId);
      if(!sl) return;
      practiceSetlistSongIdx=clamp(idx,0,sl.songs.length-1);
      const key=sl.songs[practiceSetlistSongIdx];
      const data=loadPracticeDataFromKey(key);
      if(!data){
        alert(`「${getSongTitle(key)}」の記録データがありません。先に記録モードで保存してください。`);
        return;
      }
      practiceData=data;
      practiceTitle.textContent=data.title;
      pauseBtn.textContent='一時停止';
      updatePracticeSetlistNav();
      resetPracticeState();
    }

    document.getElementById('prev-song-btn').addEventListener('click',()=>{
      if(!practiceSetlistId) return;
      practiceStarted=false;
      jumpToSetlistSong(practiceSetlistSongIdx-1);
    });

    document.getElementById('next-song-btn').addEventListener('click',()=>{
      if(!practiceSetlistId) return;
      practiceStarted=false;
      jumpToSetlistSong(practiceSetlistSongIdx+1);
    });

    document.getElementById('practice-setlist-select').addEventListener('change',()=>{
      // セットリスト変更時: 練習モードを再入して曲を読み込む
      if(!practicePanel.classList.contains('hidden')){
        enterPracticeMode();
      }
    });

    /* ═══════════════════════════════════════════
       セットリスト管理
    ═══════════════════════════════════════════ */

    const SETLISTS_KEY='memolyric_setlists';

    function loadSetlists(){
      try{return JSON.parse(localStorage.getItem(SETLISTS_KEY))||[];}
      catch{return [];}
    }

    function saveSetlists(arr){
      localStorage.setItem(SETLISTS_KEY,JSON.stringify(arr));
    }

    function genId(){
      return 'sl_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    }

    function getSongTitle(key){
      try{
        const d=JSON.parse(localStorage.getItem(key));
        return d&&d.title ? d.title : key.replace('memolyric_','');
      }catch{return key.replace('memolyric_','');}
    }

    /* セットリスト選択ドロップダウン更新 */
    const setlistSelect=document.getElementById('setlist-select');

    function refreshSetlistSelect(){
      const prev=setlistSelect.value;
      const setlists=loadSetlists();
      setlistSelect.innerHTML='<option value="">＋ 新規追加</option>';
      setlists.forEach(sl=>{
        const opt=document.createElement('option');
        opt.value=sl.id;
        opt.textContent=sl.name+(sl.songs.length>0?` (${sl.songs.length}曲)`:'');
        setlistSelect.appendChild(opt);
      });
      if(prev && loadSetlists().some(s=>s.id===prev)) setlistSelect.value=prev;
    }

    /* 追加用曲選択ドロップダウン更新 */
    function refreshAddSongSelect(){
      const sel=document.getElementById('add-song-select');
      const keys=getSongKeys();
      sel.innerHTML='<option value="">— 保存済みの曲から選択 —</option>';
      keys.forEach(k=>{
        const opt=document.createElement('option');
        opt.value=k;
        opt.textContent=getSongTitle(k);
        sel.appendChild(opt);
      });
    }

    /* ─── workingSetlist（作業中コピー） ─── */
    let workingSetlist={id:null,name:'',songs:[]};

    function loadWorkingSetlist(id){
      if(!id){
        workingSetlist={id:null,name:'',songs:[]};
      } else {
        const sl=loadSetlists().find(s=>s.id===id);
        workingSetlist=sl?{id:sl.id,name:sl.name,songs:[...sl.songs]}:{id:null,name:'',songs:[]};
      }
      document.getElementById('setlist-name-input').value=workingSetlist.name;
      document.getElementById('delete-setlist-btn').style.display=workingSetlist.id?'':'none';
      renderWorkingSongList();
    }

    function renderWorkingSongList(){
      const list=document.getElementById('setlist-song-list');
      const empty=document.getElementById('setlist-song-empty');
      list.innerHTML='';
      if(workingSetlist.songs.length===0){
        empty.style.display='block';
        return;
      }
      empty.style.display='none';
      workingSetlist.songs.forEach((key,i)=>{
        const item=document.createElement('div');
        item.className='setlist-song-item';

        const num=document.createElement('span');num.className='setlist-song-num';num.textContent=i+1;

        const name=document.createElement('span');name.className='setlist-song-name';name.textContent=getSongTitle(key);

        const actions=document.createElement('div');actions.className='setlist-song-actions';

        const upBtn=document.createElement('button');
        upBtn.className='ghost secondary';upBtn.textContent='↑';
        upBtn.disabled=i===0;upBtn.style.opacity=i===0?'0.3':'1';
        upBtn.addEventListener('click',()=>{
          if(i===0) return;
          [workingSetlist.songs[i],workingSetlist.songs[i-1]]=[workingSetlist.songs[i-1],workingSetlist.songs[i]];
          renderWorkingSongList();
        });

        const downBtn=document.createElement('button');
        downBtn.className='ghost secondary';downBtn.textContent='↓';
        downBtn.disabled=i===workingSetlist.songs.length-1;downBtn.style.opacity=i===workingSetlist.songs.length-1?'0.3':'1';
        downBtn.addEventListener('click',()=>{
          if(i>=workingSetlist.songs.length-1) return;
          [workingSetlist.songs[i],workingSetlist.songs[i+1]]=[workingSetlist.songs[i+1],workingSetlist.songs[i]];
          renderWorkingSongList();
        });

        const removeBtn=document.createElement('button');
        removeBtn.className='ghost danger';removeBtn.textContent='削除';
        removeBtn.addEventListener('click',()=>{
          workingSetlist.songs.splice(i,1);
          renderWorkingSongList();
        });

        actions.appendChild(upBtn);actions.appendChild(downBtn);actions.appendChild(removeBtn);
        item.appendChild(num);item.appendChild(name);item.appendChild(actions);
        list.appendChild(item);
      });
    }

    /* セットリスト選択変更 */
    setlistSelect.addEventListener('change',()=>loadWorkingSetlist(setlistSelect.value));

    /* 曲を追加（作業コピーに追加するだけ） */
    document.getElementById('add-song-btn').addEventListener('click',()=>{
      const songKey=document.getElementById('add-song-select').value;
      if(!songKey){alert('追加する曲を選択してください');return;}
      workingSetlist.songs.push(songKey);
      renderWorkingSongList();
    });

    /* SetListを保存 */
    document.getElementById('save-setlist-btn').addEventListener('click',()=>{
      const name=document.getElementById('setlist-name-input').value.trim();
      if(!name){alert('セットリスト名を入力してください');return;}
      const setlists=loadSetlists();
      if(workingSetlist.id){
        const sl=setlists.find(s=>s.id===workingSetlist.id);
        if(sl){sl.name=name;sl.songs=[...workingSetlist.songs];}
      } else {
        const newId=genId();
        workingSetlist.id=newId;
        setlists.push({id:newId,name,songs:[...workingSetlist.songs]});
      }
      workingSetlist.name=name;
      saveSetlists(setlists);
      refreshSetlistSelect();
      refreshPracticeSetlistSelect();
      setlistSelect.value=workingSetlist.id;
      document.getElementById('delete-setlist-btn').style.display='';
      alert('保存しました: '+name);
    });

    /* セットリスト削除 */
    document.getElementById('delete-setlist-btn').addEventListener('click',()=>{
      if(!workingSetlist.id) return;
      if(!confirm(`セットリスト「${workingSetlist.name}」を削除しますか？`)) return;
      const updated=loadSetlists().filter(s=>s.id!==workingSetlist.id);
      saveSetlists(updated);
      refreshSetlistSelect();
      refreshPracticeSetlistSelect();
      loadWorkingSetlist('');
      setlistSelect.value='';
    });

    /* 後方互換: renderSetlistDetail は loadWorkingSetlist にエイリアス */
    function renderSetlistDetail(){ loadWorkingSetlist(setlistSelect.value); }

    /* ═══════════════════════════════════════════
       スリープ防止 (Wake Lock API)
    ═══════════════════════════════════════════ */
    let wakeLock = null;
    let wakeLockDesired = false; // ユーザーが ON にしたい意図を保持
    const wakeLockBtn = document.getElementById('wakelock-btn');
    const wakeLockSupported = 'wakeLock' in navigator;

    function updateWakeLockBtn() {
      if (!wakeLockSupported) {
        wakeLockBtn.textContent = 'スリープ防止 非対応';
        wakeLockBtn.style.opacity = '0.4';
        return;
      }
      if (wakeLock) {
        wakeLockBtn.classList.add('active');
        wakeLockBtn.textContent = 'スリープ防止 ON';
      } else {
        wakeLockBtn.classList.remove('active');
        wakeLockBtn.textContent = 'スリープ防止';
      }
    }

    async function requestWakeLock() {
      if (!wakeLockSupported) return;
      wakeLockDesired = true;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          wakeLock = null;
          updateWakeLockBtn();
        });
        updateWakeLockBtn();
      } catch(e) {
        console.warn('WakeLock request failed:', e);
        updateWakeLockBtn();
      }
    }

    function releaseWakeLock() {
      wakeLockDesired = false;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      updateWakeLockBtn();
    }

    wakeLockBtn.addEventListener('click', () => {
      if (wakeLockDesired) releaseWakeLock();
      else requestWakeLock();
    });

    // 画面復帰時: ユーザーが ON にしていたなら再取得
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && wakeLockDesired && !wakeLock) {
        requestWakeLock();
      }
    });

    // iOS BFCache（戻る/進む）からの復帰にも対応
    window.addEventListener('pageshow', (e) => {
      if (e.persisted && wakeLockDesired && !wakeLock) {
        requestWakeLock();
      }
    });

    // 練習モード開始時に自動 ON (setActiveTab から呼ばれる)

    /* ─── 初期化 ─── */
    updateWakeLockBtn();
    refreshSavedList(); // refreshSongDropdown も内部で呼ばれる
    refreshSetlistSelect();
    loadWorkingSetlist('');
    refreshPracticeSetlistSelect();
    updateLyricsFromTextarea();
    setActiveTab('practice');
  </script>
</body>
</html>
